.screen{position:relative;z-index:1;min-height:100dvh;display:flex;flex-direction:column}
.card{background:rgba(253,250,244,0.94);border:1px solid var(--border);backdrop-filter:blur(10px);border-radius:24px}
.btn-icon{padding:10px;border-radius:14px;background:rgba(253,250,244,0.92);border:1px solid rgba(200,192,168,0.8);backdrop-filter:blur(6px);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:opacity .15s,transform .1s;-webkit-user-select:none;user-select:none}
.btn-icon:active{transform:scale(0.92)}
.btn-primary{width:100%;padding:16px;color:#fff;font-weight:900;font-size:1.1rem;border-radius:18px;border:none;cursor:pointer;font-family:var(--fp);background:linear-gradient(135deg,var(--orange),var(--orange-dark));box-shadow:0 4px 16px rgba(196,84,42,.35);transition:opacity .15s,transform .1s}
.btn-primary:active{transform:scale(0.97)}
.btn-secondary{padding:10px 18px;border-radius:14px;font-weight:700;font-size:.875rem;cursor:pointer;transition:opacity .15s,transform .1s;border:none}
.btn-secondary:active{transform:scale(0.95)}
@keyframes tile-error{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
@keyframes win-reveal{0%{opacity:0;transform:scale(.7) rotate(-5deg)}60%{transform:scale(1.05) rotate(1deg)}100%{opacity:1;transform:scale(1)}}
@keyframes star-pop{0%{transform:scale(0) rotate(-30deg);opacity:0}70%{transform:scale(1.3) rotate(5deg)}100%{transform:scale(1);opacity:1}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes shimmer{0%{background-position:-200% center}100%{background-position:200% center}}
.tile-error{animation:tile-error .3s ease-out}
.hint-tile{outline:3px solid var(--gold);outline-offset:2px;animation:shimmer 1s linear infinite;background:linear-gradient(90deg,transparent,rgba(232,201,106,.5),transparent) !important;background-size:200% 100% !important}
.float-anim{animation:float 3s ease-in-out infinite}
.win-anim{animation:win-reveal .6s cubic-bezier(.34,1.56,.64,1) forwards}
.star-anim{animation:star-pop .5s cubic-bezier(.34,1.56,.64,1) forwards;opacity:0}
.hidden{display:none!important}
#crop-screen{position:fixed;inset:0;z-index:100;background:#000;flex-direction:column}
#crop-container{flex:1;position:relative;overflow:hidden;touch-action:none;user-select:none;display:flex;align-items:center;justify-content:center;background:#000}
#crop-img{max-width:100%;max-height:100%;object-fit:contain;pointer-events:none;display:block;position:relative;z-index:0}
.crop-overlay{position:absolute;background:rgba(0,0,0,.6);pointer-events:none}
.crop-border{position:absolute;border:2px solid #fff;pointer-events:none}
.crop-handle{position:absolute;width:36px;height:36px;background:#fff;border:2px solid rgba(0,0,0,.3);border-radius:6px;touch-action:none;cursor:nwse-resize;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,.5);transform:translate(-50%,-50%)}
.crop-move{position:absolute;width:44px;height:44px;background:rgba(255,255,255,.2);border:2px solid #fff;border-radius:50%;display:flex;align-items:center;justify-content:center;touch-action:none;cursor:grab;z-index:10;transform:translate(-50%,-50%);backdrop-filter:blur(4px)}
#puzzle-grid{display:grid;padding:6px;background:var(--muted);border-radius:20px;border:2px solid var(--border);box-shadow:0 8px 32px rgba(196,84,42,.1)}
.tile{display:flex;align-items:center;justify-content:center;border-radius:12px;font-family:var(--fp);font-weight:900;cursor:pointer;transition:transform .1s;-webkit-user-select:none;user-select:none;touch-action:none;overflow:hidden;position:relative}
.tile:active{transform:scale(0.93)}
.tile-blank{background:#D8D0C0;border:2px dashed #B0A890;cursor:default}
/* volume slider */
input[type=range]{-webkit-appearance:none;width:100%;height:6px;border-radius:3px;background:var(--muted);outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:var(--orange);cursor:pointer;box-shadow:0 2px 6px rgba(196,84,42,.4)}
body.dark{color:#f0ece4}
body.dark .card{background:rgba(10,12,20,0.85);border-color:rgba(60,70,100,.6)}
body.dark .btn-icon{background:rgba(10,12,20,0.82);border-color:rgba(60,70,100,.5)}

/* PWA install button */
#btn-install{
  display:none;
  align-items:center;justify-content:center;gap:10px;
  width:100%;max-width:420px;
  margin-top:12px;padding:14px 20px;
  border-radius:18px;border:2px solid rgba(255,255,255,.6);
  background:linear-gradient(135deg,rgba(58,96,64,.92),rgba(42,72,40,.96));
  color:#fff;font-weight:700;font-size:1rem;cursor:pointer;
  backdrop-filter:blur(8px);
  box-shadow:0 4px 20px rgba(0,0,0,.25);
  transition:transform .15s,opacity .15s;
}
#btn-install:active{transform:scale(.97)}
#btn-install .install-icon{font-size:1.4rem;line-height:1}
#btn-install-ios{
  display:none;
  flex-direction:column;align-items:center;gap:6px;
  width:100%;max-width:420px;
  margin-top:12px;padding:12px 16px;
  border-radius:16px;border:1px dashed rgba(58,96,64,.5);
  background:rgba(253,250,244,.85);backdrop-filter:blur(8px);
  color:var(--green);font-size:.8rem;text-align:center;
}
</style>
</head>
<body>
<div class="bg"></div>

<!-- HOME -->
<div id="screen-home" class="screen" style="align-items:center;justify-content:center;padding:16px;padding-top:calc(env(safe-area-inset-top) + 16px)">
  <div class="float-anim" style="text-align:center;margin-bottom:28px">
    <!-- Logo SVG -->
    <div style="display:flex;justify-content:center;margin-bottom:12px">
      <svg width="72" height="72" viewBox="0 0 72 72" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="lg1" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#92B4D0"/>
            <stop offset="100%" stop-color="#1A7AC4"/>
          </linearGradient>
          <linearGradient id="lg2" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#E8C96A"/>
            <stop offset="100%" stop-color="#C4952A"/>
          </linearGradient>
          <linearGradient id="lg3" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#C4542A"/>
            <stop offset="100%" stop-color="#A03820"/>
          </linearGradient>
          <linearGradient id="lg4" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#6B8C3E"/>
            <stop offset="100%" stop-color="#3A6040"/>
          </linearGradient>
          <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="rgba(0,0,0,0.25)"/>
          </filter>
        </defs>
        <!-- Outer rounded square background -->
        <rect width="72" height="72" rx="16" fill="rgba(253,250,244,0.95)" filter="url(#shadow)"/>
        <!-- 3x3 grid of tiles with gap=3, tile=20px -->
        <!-- Row 1 -->
        <rect x="5"  y="5"  width="20" height="20" rx="5" fill="url(#lg1)"/>
        <rect x="28" y="5"  width="20" height="20" rx="5" fill="url(#lg2)"/>
        <rect x="51" y="5"  width="16" height="20" rx="5" fill="url(#lg1)"/>
        <!-- Row 2 -->
        <rect x="5"  y="28" width="20" height="20" rx="5" fill="url(#lg4)"/>
        <rect x="28" y="28" width="20" height="20" rx="5" fill="url(#lg3)"/>
        <rect x="51" y="28" width="16" height="20" rx="5" fill="url(#lg4)"/>
        <!-- Row 3 -->
        <rect x="5"  y="51" width="20" height="16" rx="5" fill="url(#lg2)"/>
        <rect x="28" y="51" width="20" height="16" rx="5" fill="url(#lg1)"/>
        <!-- Empty tile (bottom-right) -->
        <rect x="51" y="51" width="16" height="16" rx="5" fill="none" stroke="#C8C0A8" stroke-width="2" stroke-dasharray="3,2"/>
        <!-- Numbers on tiles -->
        <text x="15" y="19" text-anchor="middle" fill="white" font-family="Georgia,serif" font-size="10" font-weight="900">1</text>
        <text x="38" y="19" text-anchor="middle" fill="white" font-family="Georgia,serif" font-size="10" font-weight="900">2</text>
        <text x="59" y="19" text-anchor="middle" fill="white" font-family="Georgia,serif" font-size="10" font-weight="900">3</text>
        <text x="15" y="42" text-anchor="middle" fill="white" font-family="Georgia,serif" font-size="10" font-weight="900">4</text>
        <text x="38" y="42" text-anchor="middle" fill="white" font-family="Georgia,serif" font-size="10" font-weight="900">5</text>
        <text x="59" y="42" text-anchor="middle" fill="white" font-family="Georgia,serif" font-size="10" font-weight="900">6</text>
        <text x="15" y="63" text-anchor="middle" fill="white" font-family="Georgia,serif" font-size="10" font-weight="900">7</text>
        <text x="38" y="63" text-anchor="middle" fill="white" font-family="Georgia,serif" font-size="10" font-weight="900">8</text>
      </svg>
    </div>
    <div style="display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:4px">
      <div style="width:30px;height:2px;background:var(--text);border-radius:2px"></div>
      <span id="home-subtitle" style="font-size:.7rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--text)"></span>
      <div style="width:30px;height:2px;background:var(--text);border-radius:2px"></div>
    </div>
    <h1 id="home-title" style="font-family:var(--fp);font-size:clamp(2.5rem,10vw,3.5rem);font-weight:900;color:var(--text);text-shadow:2px 3px 0 rgba(232,201,106,.4)"></h1>
    <p id="home-sub" style="margin-top:6px;font-size:.95rem;font-style:italic;color:var(--subtle)"></p>
  </div>
  <!-- PWA Install button (Android/Desktop) -->
  <button id="btn-install" onclick="installPWA()">
    <span class="install-icon">📲</span>
    <span id="lbl-install">Installer l'application</span>
  </button>
  <!-- iOS install hint -->

// ═══════════ PUZZLE LOGIC ═══════════
const solved=n=>{const a=[];for(let i=1;i<n*n;i++)a.push(i);a.push(0);return a;};
const validMoves=(bi,n)=>{const r=Math.floor(bi/n),c=bi%n,m=[];if(r>0)m.push((r-1)*n+c);if(r<n-1)m.push((r+1)*n+c);if(c>0)m.push(r*n+c-1);if(c<n-1)m.push(r*n+c+1);return m;};
const canMove=(ti,bi,n)=>validMoves(bi,n).includes(ti);
const applyMove=(b,ti,bi)=>{const a=[...b];[a[ti],a[bi]]=[a[bi],a[ti]];return a;};
const isSolved=(b,n)=>{const s=solved(n);return b.every((v,i)=>v===s[i]);};
const shuffle=(board,n,diff)=>{const counts={3:{relax:20,challenge:40,expert:80},4:{relax:40,challenge:80,expert:160},5:{relax:75,challenge:150,expert:300},6:{relax:125,challenge:250,expert:500}};let cur=[...board],bi=cur.indexOf(0),last=-1,cnt=counts[n]?.[diff]||40;for(let i=0;i<cnt;i++){const ms=validMoves(bi,n).filter(m=>m!==last);const ch=ms[Math.floor(Math.random()*ms.length)];cur=applyMove(cur,ch,bi);last=bi;bi=ch;}return cur;};
const fmtTime=s=>String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');
const calcStars=(m,s,n)=>{const t={3:[30,60,20,40],4:[60,120,50,100],5:[150,300,120,250],6:[300,600,250,500]};const[t3,t2,m3,m2]=t[n];return s<=t3&&m<=m3?3:s<=t2&&m<=m2?2:1;};

// ═══════════ AUDIO ENGINE ═══════════
let audioCtx=null,musicNodes=[],tileClickBuffer=null,winBuffer=null;
function getCtx(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}

// ── Sound effects ──
function buildClickSound(){
  const ctx=getCtx(),buf=ctx.createBuffer(1,ctx.sampleRate*.06,ctx.sampleRate);
  const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(ctx.sampleRate*.01));
  return buf;
}
function buildWinSound(){
  const ctx=getCtx(),dur=1.2,buf=ctx.createBuffer(1,ctx.sampleRate*dur,ctx.sampleRate);
  const d=buf.getChannelData(0),sr=ctx.sampleRate;
  const notes=[523,659,784,1047];
  notes.forEach((f,i)=>{const start=Math.floor(i*.25*sr);for(let j=0;j<Math.floor(.3*sr)&&(start+j)<d.length;j++)d[start+j]+=Math.sin(2*Math.PI*f*j/sr)*Math.exp(-j/(sr*.18))*.4;});
  return buf;
}

function playBuffer(buf){
  if(!buf||S.music==='none') return;
  const ctx=getCtx();
  const src=ctx.createBufferSource();
  const gain=ctx.createGain();
  gain.gain.value=S.volume/100;
  src.buffer=buf;src.connect(gain);gain.connect(ctx.destination);src.start();
}

function playTileClick(){
  if(S.music==='none') return;
  const ctx=getCtx();
  const osc=ctx.createOscillator(),gain=ctx.createGain();
  const freq=S.music==='energetic'?300+Math.random()*200:S.music==='artistic'?200+Math.random()*400:220+Math.random()*80;
  const type=S.music==='artistic'?'sine':S.music==='energetic'?'square':'triangle';
  osc.type=type;osc.frequency.value=freq;
  gain.gain.setValueAtTime(S.volume/100*.3,ctx.currentTime);
  gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+.15);
  osc.connect(gain);gain.connect(ctx.destination);osc.start();osc.stop(ctx.currentTime+.15);
}

function playWin(){
  if(S.music==='none') return;
  const ctx=getCtx();
  const notes=S.music==='calm'?[523,659,784,1047]:S.music==='energetic'?[880,1108,1318,1760]:S.music==='artistic'?[440,554,659,880]:S.music==='sounds'?[600,750,900,1200]:[523,659,784,1047];
  notes.forEach((f,i)=>{
    setTimeout(()=>{
      const osc=ctx.createOscillator(),gain=ctx.createGain();
      osc.frequency.value=f;
      osc.type=S.music==='energetic'?'sawtooth':'sine';
      gain.gain.setValueAtTime(S.volume/100*.35,ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+.5);
      osc.connect(gain);gain.connect(ctx.destination);osc.start();osc.stop(ctx.currentTime+.5);
    },i*220);
  });
}

// ── Background music ──
function stopMusic(){musicNodes.forEach(n=>{try{n.stop();}catch(e){}}); musicNodes=[];}

function startMusic(){
  stopMusic();
  if(S.music==='none'||S.music==='sounds') return;
  const ctx=getCtx();
  const vol=S.volume/100;

  if(S.music==='calm'){
    // Gentle ambient pad: slow-cycling sine waves
    const freqs=[130,196,261,330];
    freqs.forEach((f,i)=>{
      const osc=ctx.createOscillator(),gain=ctx.createGain(),lfo=ctx.createOscillator(),lfoGain=ctx.createGain();
      osc.type='sine';osc.frequency.value=f;
      lfo.type='sine';lfo.frequency.value=.15+i*.05;
      lfoGain.gain.value=vol*.04;
      lfo.connect(lfoGain);lfoGain.connect(gain.gain);
      gain.gain.value=vol*.08;
      osc.connect(gain);gain.connect(ctx.destination);
      osc.start();lfo.start();
      musicNodes.push(osc,lfo);
    });
  } else if(S.music==='energetic'){
    // Driving arpeggio pattern
    const scale=[220,277,330,440,554,660];
    let step=0;
    const osc=ctx.createOscillator(),gain=ctx.createGain();
    osc.type='square';gain.gain.value=vol*.06;
    osc.connect(gain);gain.connect(ctx.destination);osc.start();
    musicNodes.push(osc);
    const iv=setInterval(()=>{
      if(!musicNodes.includes(osc)){clearInterval(iv);return;}
      osc.frequency.setValueAtTime(scale[step%scale.length],ctx.currentTime);
      step++;
    },180);
    musicNodes.push({stop:()=>clearInterval(iv)});
  } else if(S.music==='artistic'){
    // Impressionistic: slow random pentatonic
    const penta=[261,294,330,392,440,523,587,659];
    let idx=0;
    const play=()=>{
      if(!audioCtx) return;
      const osc=ctx.createOscillator(),gain=ctx.createGain();
      const f=penta[Math.floor(Math.random()*penta.length)];
      osc.type='sine';osc.frequency.value=f;
      gain.gain.setValueAtTime(vol*.18,ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+1.8);
      osc.connect(gain);gain.connect(ctx.destination);osc.start();osc.stop(ctx.currentTime+1.8);
    };
    play();
    const iv=setInterval(()=>{if(S.music==='artistic'&&audioCtx)play();},1400);
    musicNodes.push({stop:()=>clearInterval(iv)});
  }
}

function resumeCtx(){if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();}

// ═══════════ TIMER ═══════════
let timerInterval=null;
function startTimer(){if(timerInterval)return;timerInterval=setInterval(()=>{if(S.timerStarted&&!S.paused&&!isHidden('screen-game')){S.seconds++;document.getElementById('game-timer').textContent=fmtTime(S.seconds);}  },1000);}
function stopTimer(){clearInterval(timerInterval);timerInterval=null;}
const isHidden=id=>document.getElementById(id).classList.contains('hidden');

const SCREENS=['screen-home','screen-game','screen-win','screen-grid','screen-model','screen-settings'];

  else if(id==='screen-model')renderModel();

}

// ═══════════ GAME ═══════════
function startGame(training=false){
  resumeCtx();
  const b=solved(S.gridSize);
  S.board=shuffle(b,S.gridSize,S.difficulty);
  S.blankIndex=S.board.indexOf(0);
  S.moves=0;S.seconds=0;S.timerStarted=false;S.paused=false;S.training=training;S.hintsLeft=3;S.hintTile=null;
  showScreen('screen-game');
  renderGame();
  startTimer();
  startMusic();
}
function resumeGame(){
  if(!S.savedGame) return;
  resumeCtx();
  Object.assign(S,S.savedGame);
  S.blankIndex=S.board.indexOf(0);S.paused=true;S.timerStarted=true;
  showScreen('screen-game');renderGame();startTimer();startMusic();
}
function clearSaved(){S.savedGame=null;saveState();renderHome();}
function goHome(){
  S.savedGame={board:[...S.board],gridSize:S.gridSize,mode:S.mode,selectedImage:S.selectedImage,customImages:[...S.customImages],seconds:S.seconds,moves:S.moves,hintsLeft:S.hintsLeft};
  saveState();stopTimer();stopMusic();showScreen('screen-home');renderHome();
}
function restartGame(){
  const b=solved(S.gridSize);
  S.board=shuffle(b,S.gridSize,S.difficulty);
  S.blankIndex=S.board.indexOf(0);S.moves=0;S.seconds=0;S.timerStarted=false;S.paused=false;S.hintsLeft=3;S.hintTile=null;
  renderGame();startMusic();
}
function replayGame(){S.moves=0;S.seconds=0;S.timerStarted=false;S.paused=false;S.hintsLeft=3;S.hintTile=null;restartGame();showScreen('screen-game');renderGame();startTimer();startMusic();}
function togglePause(){
  S.paused=!S.paused;
  document.getElementById('btn-pause').textContent=S.paused?'▶':'⏸';
  document.getElementById('pause-overlay').style.display=S.paused?'flex':'none';
  document.getElementById('pause-overlay').classList.toggle('hidden',!S.paused);
  document.getElementById('lbl-paused').textContent=T('pause');
  document.getElementById('lbl-resume').textContent=T('resume');
  if(S.paused)stopMusic();else startMusic();
}
function showHint(){
  if(S.hintsLeft<=0) return;
  const moves=validMoves(S.blankIndex,S.gridSize);
  if(!moves.length) return;
  S.hintTile=moves[Math.floor(Math.random()*moves.length)];S.hintsLeft--;
  renderPuzzle();
  setTimeout(()=>{S.hintTile=null;renderPuzzle();},2000);
}
function clickTile(idx){
  if(S.paused||S.board[idx]===0) return;
  if(!canMove(idx,S.blankIndex,S.gridSize)){
    const el=document.querySelector(`[data-idx="${idx}"]`);
    if(el){el.classList.add('tile-error');setTimeout(()=>el.classList.remove('tile-error'),300);}
    return;
  }
  S.board=applyMove(S.board,idx,S.blankIndex);S.blankIndex=idx;S.moves++;
  if(!S.timerStarted)S.timerStarted=true;
  S.hintTile=null;
  document.getElementById('game-moves').textContent=S.moves;
  playTileClick();
  renderPuzzle();
  if(isSolved(S.board,S.gridSize)){
    S.winStars=calcStars(S.moves,S.seconds,S.gridSize);
    stopTimer();stopMusic();
    if(!S.training){S.savedGame=null;saveState();}
    playWin();
    setTimeout(()=>{showScreen('screen-win');renderWin();},150);
  }
}
let touchOrigin=null;
function onTouchStart(e,idx){const t=e.touches[0];touchOrigin={x:t.clientX,y:t.clientY,idx};}
function onTouchEnd(e,idx){
  if(!touchOrigin) return;
  const t=e.changedTouches[0];const dx=t.clientX-touchOrigin.x,dy=t.clientY-touchOrigin.y;const ax=Math.abs(dx),ay=Math.abs(dy);
  if(ax<15&&ay<15){clickTile(idx);}
  else{const r=Math.floor(S.blankIndex/S.gridSize),c=S.blankIndex%S.gridSize;let ti=-1;if(ax>ay){if(dx>0&&c>0)ti=r*S.gridSize+(c-1);else if(dx<0&&c<S.gridSize-1)ti=r*S.gridSize+(c+1);}else{if(dy>0&&r>0)ti=(r-1)*S.gridSize+c;else if(dy<0&&r<S.gridSize-1)ti=(r+1)*S.gridSize+c;}if(ti>=0)clickTile(ti);}
  touchOrigin=null;e.preventDefault();
}
document.addEventListener('keydown',e=>{
  if(isHidden('screen-game')) return;
  if(S.paused) return;
  const r=Math.floor(S.blankIndex/S.gridSize),c=S.blankIndex%S.gridSize;let ti=-1;
  if(e.key==='ArrowUp'&&r<S.gridSize-1)ti=(r+1)*S.gridSize+c;
  else if(e.key==='ArrowDown'&&r>0)ti=(r-1)*S.gridSize+c;
  else if(e.key==='ArrowLeft'&&c<S.gridSize-1)ti=r*S.gridSize+(c+1);
  else if(e.key==='ArrowRight'&&c>0)ti=r*S.gridSize+(c-1);
  if(ti>=0){e.preventDefault();clickTile(ti);}
});

// ═══════════ RENDER GAME ═══════════
function renderGame(){
  document.getElementById('game-timer').textContent=fmtTime(S.seconds);
  document.getElementById('game-moves').textContent=S.moves;
  document.getElementById('lbl-preview').textContent=T('preview');
  document.getElementById('lbl-hint').textContent=T('hint');
  document.getElementById('hint-count').textContent=S.hintsLeft+' '+T('hintsLeft');
  document.getElementById('btn-hint').disabled=S.hintsLeft<=0;
  document.getElementById('btn-hint').style.opacity=S.hintsLeft>0?'1':'0.5';
  // Make hint button a square matching the preview block size
  const cs=Math.floor(135/S.gridSize);
  const previewSize=cs*S.gridSize+8+4; // cells + padding(4*2) + border(1*2)
  const hint=document.getElementById('btn-hint');
  hint.style.width=previewSize+'px';
  hint.style.height=previewSize+'px';
  const tb=document.getElementById('training-badge');
  if(S.training){tb.classList.remove('hidden');tb.style.display='';}else{tb.classList.add('hidden');}
  document.getElementById('pause-overlay').classList.add('hidden');
  document.getElementById('pause-overlay').style.display='none';
  renderPreview();renderPuzzle();
}
function renderPreview(){
  const pg=document.getElementById('preview-grid');
  const n=S.gridSize, cs=Math.floor(135/n);
  const isImg=(S.mode==='image'||S.mode==='custom')&&S.selectedImage;
  pg.style.display='grid';
  pg.style.gridTemplateColumns=`repeat(${n},${cs}px)`;
  pg.style.gap=isImg?'1px':'1px';
  const total=cs*n; // total image size = cell * grid (no gaps for bg-size)
  pg.innerHTML=solved(n).map((v,i)=>{
    const row=Math.floor(i/n), col=i%n, blank=v===0;
    if(isImg){
      if(blank) return `<div style="width:${cs}px;height:${cs}px;background:#EDE8DC;border-radius:2px"></div>`;
      return `<div style="width:${cs}px;height:${cs}px;background-image:url('${S.selectedImage}');background-size:${total}px ${total}px;background-position:-${col*cs}px -${row*cs}px;background-repeat:no-repeat;border-radius:2px"></div>`;
    }
    if(blank) return `<div style="width:${cs}px;height:${cs}px;border-radius:2px;border:1px dashed #B0A890"></div>`;
    return `<div style="width:${cs}px;height:${cs}px;border-radius:2px;background:#92B4D0;display:flex;align-items:center;justify-content:center;font-size:${Math.max(7,Math.floor(cs*.5))}px;font-weight:900;color:#fff;font-family:var(--fp)">${v}</div>`;
  }).join('');
}
function renderPuzzle(){
  const grid=document.getElementById('puzzle-grid');
  const n=S.gridSize, vw=Math.min(window.innerWidth-32,480);
  const gap=n<=4?4:3;
  const cs=Math.max(40,Math.floor((vw-12-gap*(n-1))/n));
  // bg-size = cs * n (the full image spread across n cells, ignoring gaps)
  const bgSize=cs*n;
  grid.style.gridTemplateColumns=`repeat(${n},${cs}px)`;
  grid.style.gap=`${gap}px`;
  const isImg=(S.mode==='image'||S.mode==='custom')&&S.selectedImage;
  grid.innerHTML=S.board.map((v,idx)=>{
    if(v===0) return `<div class="tile tile-blank" style="width:${cs}px;height:${cs}px;border-radius:${n<=4?12:8}px"></div>`;
    const cp=v-1, row=Math.floor(cp/n), col=cp%n, isHint=S.hintTile===idx;
    const br=n<=4?12:8;
    if(isImg){
      const border=isHint?'3px solid #E8C96A':'2px solid rgba(255,255,255,0.5)';
      const shadow=isHint?'0 0 14px rgba(232,201,106,.8)':'0 1px 3px rgba(0,0,0,.2)';
      return `<button class="tile${isHint?' hint-tile':''}" data-idx="${idx}"
        style="width:${cs}px;height:${cs}px;border-radius:${br}px;
          background-image:url('${S.selectedImage}');
          background-size:${bgSize}px ${bgSize}px;
          background-position:-${col*cs}px -${row*cs}px;
          background-repeat:no-repeat;
          border:${border};box-shadow:${shadow};"
        onclick="clickTile(${idx})" ontouchstart="onTouchStart(event,${idx})" ontouchend="onTouchEnd(event,${idx})"></button>`;
    } else {
      const bg=isHint?'linear-gradient(135deg,#E8C96A,#C4952A)':'linear-gradient(135deg,#92B4D0,#1A7AC4)';
      const border=isHint?'3px solid #C4952A':'2px solid #1060A0';
      const shadow=isHint?'0 0 14px rgba(232,201,106,.6)':'inset 0 1px 0 rgba(255,255,255,.25),0 2px 5px rgba(0,0,0,.15)';
      return `<button class="tile${isHint?' hint-tile':''}" data-idx="${idx}"
        style="width:${cs}px;height:${cs}px;border-radius:${br}px;
          font-size:${Math.floor(cs*.35)}px;
          background:${bg};color:#fff;border:${border};box-shadow:${shadow};"
        onclick="clickTile(${idx})" ontouchstart="onTouchStart(event,${idx})" ontouchend="onTouchEnd(event,${idx})">${v}</button>`;
    }
  }).join('');
}

// ═══════════ WIN ═══════════
function renderWin(){

// ═══════════ CROP ═══════════
let cropData={src:null,x:15,y:15,size:70,drag:null,origin:null};
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
function handleFileSelect(e){const f=e.target.files?.[0];if(!f)return;const r=new FileReader();r.onload=ev=>{if(ev.target?.result)openCrop(ev.target.result);};r.readAsDataURL(f);e.target.value='';}
function openCrop(src){cropData={src,x:15,y:15,size:70,drag:null,origin:null};document.getElementById('crop-img').src=src;document.getElementById('crop-screen').style.display='flex';document.getElementById('lbl-crop').textContent=T('crop');document.getElementById('lbl-validate-crop').textContent=T('validate');renderCropOverlay();}
function closeCrop(){document.getElementById('crop-screen').style.display='none';}
// Returns the actual rendered image rect inside the crop-container (accounting for object-fit:contain)
function getImgRect(){
  // img has max-width/max-height:100% inside a flex container → getBoundingClientRect is accurate
  const img=document.getElementById('crop-img');
  const con=document.getElementById('crop-container');
  const cr=con.getBoundingClientRect();
  const ir=img.getBoundingClientRect();
  return {
    left: ir.left - cr.left,
    top:  ir.top  - cr.top,
    width:  ir.width,
    height: ir.height
  };
}

function renderCropOverlay(){
  const con=document.getElementById('crop-container');
  con.querySelectorAll('.crop-overlay,.crop-border,.crop-handle,.crop-move,.crop-thirds').forEach(el=>el.remove());
  const r=getImgRect();
  const{x,y,size}=cropData;
  // All coords in px relative to container
  const x0=r.left + x/100*r.width;
  const y0=r.top  + y/100*r.height;
  const sz=size/100*Math.min(r.width,r.height); // square: min dimension

  const mk=(l,t,w,h)=>{
    const d=document.createElement('div');d.className='crop-overlay';
    Object.assign(d.style,{left:l+'px',top:t+'px',width:w+'px',height:h+'px'});
    con.appendChild(d);
  };
  // Letterbox areas (outside image)
  if(r.top>0)              mk(0, 0,                  con.clientWidth,  r.top);
  if(r.top+r.height<con.clientHeight) mk(0, r.top+r.height, con.clientWidth,  con.clientHeight-r.top-r.height);
  if(r.left>0)             mk(0, r.top,               r.left,           r.height);
  if(r.left+r.width<con.clientWidth)  mk(r.left+r.width, r.top, con.clientWidth-r.left-r.width, r.height);
  // Inside image, outside crop
  mk(r.left,    r.top,         r.width,      y0-r.top);          // above crop
  mk(r.left,    y0+sz,         r.width,      r.top+r.height-y0-sz); // below crop
  mk(r.left,    y0,            x0-r.left,    sz);                 // left of crop
  mk(x0+sz,     y0,            r.left+r.width-x0-sz, sz);         // right of crop

  // Crop border
  const border=document.createElement('div');border.className='crop-border';
  Object.assign(border.style,{left:x0+'px',top:y0+'px',width:sz+'px',height:sz+'px'});
  ['33.3','66.6'].forEach(p=>{
    const hh=document.createElement('div');hh.className='crop-thirds';
    Object.assign(hh.style,{position:'absolute',left:p+'%',top:0,bottom:0,width:'1px',background:'rgba(255,255,255,.3)',pointerEvents:'none'});
    border.appendChild(hh);
    const vv=document.createElement('div');vv.className='crop-thirds';
    Object.assign(vv.style,{position:'absolute',top:p+'%',left:0,right:0,height:'1px',background:'rgba(255,255,255,.3)',pointerEvents:'none'});
    border.appendChild(vv);
  });
  con.appendChild(border);

  // Move handle — centre
  const mv=document.createElement('div');mv.className='crop-move';
  mv.innerHTML='<span style="color:#fff;font-size:1.1rem;line-height:1">✥</span>';
  Object.assign(mv.style,{left:(x0+sz/2)+'px',top:(y0+sz/2)+'px'});
  mv.addEventListener('mousedown',e=>startCropDrag('move',e));
  mv.addEventListener('touchstart',e=>startCropDrag('move',e),{passive:false});
  con.appendChild(mv);

  // Corner handles — centered on each corner via transform:translate(-50%,-50%) in CSS
  [[x0,    y0,    'tl'],
   [x0+sz, y0,    'tr'],
   [x0,    y0+sz, 'bl'],
   [x0+sz, y0+sz, 'br']].forEach(([cx,cy,corner])=>{
    const h=document.createElement('div');h.className='crop-handle';
    Object.assign(h.style,{left:cx+'px',top:cy+'px'});
    h.addEventListener('mousedown',e=>startCropDrag(corner,e));
    h.addEventListener('touchstart',e=>startCropDrag(corner,e),{passive:false});
    con.appendChild(h);
  });
}

function startCropDrag(mode,e){
  e.preventDefault();
  e.stopPropagation();
  const p='touches' in e?e.touches[0]:e;
  cropData.drag=mode;
  cropData.origin={mx:p.clientX,my:p.clientY,ox:cropData.x,oy:cropData.y,os:cropData.size};
  // Attach move/end to window so we never lose the drag even if finger moves off the handle
  window.addEventListener('mousemove',onCropMove);
  window.addEventListener('touchmove',onCropMove,{passive:false});
  window.addEventListener('mouseup',stopCropDrag);
  window.addEventListener('touchend',stopCropDrag);
}

function stopCropDrag(){
  cropData.drag=null;
  window.removeEventListener('mousemove',onCropMove);
  window.removeEventListener('touchmove',onCropMove);
  window.removeEventListener('mouseup',stopCropDrag);
  window.removeEventListener('touchend',stopCropDrag);
}

function onCropMove(e){
  if(!cropData.drag)return;
  if(e.cancelable)e.preventDefault();
  const p='touches' in e?e.touches[0]:e;
  const r=getImgRect();
  const dx=(p.clientX-cropData.origin.mx)/r.width*100;
  const dy=(p.clientY-cropData.origin.my)/r.height*100;
  const{ox,oy,os}=cropData.origin;
  const MIN=10;
  if(cropData.drag==='move'){
    cropData.x=clamp(ox+dx,0,100-os);
    cropData.y=clamp(oy+dy,0,100-os);
  } else if(cropData.drag==='br'){
    const d=Math.min(dx,dy);
    cropData.size=clamp(os+d,MIN,Math.min(100-cropData.x,100-cropData.y));
  } else if(cropData.drag==='tl'){
    const d=Math.min(dx,dy);
    const nx=clamp(ox+d,0,ox+os-MIN);
    const ny=clamp(oy+d,0,oy+os-MIN);
    cropData.x=nx;cropData.y=ny;
    cropData.size=Math.max(MIN,ox+os-nx);
  } else if(cropData.drag==='tr'){
    const ny=clamp(oy+dy,0,oy+os-MIN);
    cropData.y=ny;
    cropData.size=clamp(os-dy,MIN,100-cropData.x);
  } else if(cropData.drag==='bl'){
    const nx=clamp(ox+dx,0,ox+os-MIN);
    cropData.x=nx;
    cropData.size=clamp(os-dx,MIN,100-cropData.y);
  }
  renderCropOverlay();
}
function confirmCrop(){
  const img=document.getElementById('crop-img');
  const r=getImgRect();
  // cropData x,y,size are % of the rendered image rect
  // Convert to natural image pixels
  const scaleX=img.naturalWidth/r.width;
  const scaleY=img.naturalHeight/r.height;
  // crop is square: use width scale for both dimensions
  const px=(cropData.x/100)*r.width*scaleX;
  const py=(cropData.y/100)*r.height*scaleY;
  const ps=(cropData.size/100)*r.width*scaleX; // square crop in natural px
  const canvas=document.createElement('canvas');
  canvas.width=600;canvas.height=600;
  canvas.getContext('2d').drawImage(img, px, py, ps, ps, 0, 0, 600, 600);
  const dataUrl=canvas.toDataURL('image/jpeg',.9);
  S.customImages=[dataUrl,...S.customImages];S.mode='image';S.selectedImage=dataUrl;
  saveState();closeCrop();renderModel();
}

let deferredPrompt=null;

window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();
  deferredPrompt=e;
  const btn=document.getElementById('btn-install');
  btn.style.display='flex';
});

window.addEventListener('appinstalled',()=>{
  document.getElementById('btn-install').style.display='none';
  deferredPrompt=null;
});

function installPWA(){
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(r=>{
    if(r.outcome==='accepted'){
      document.getElementById('btn-install').style.display='none';
    }
    deferredPrompt=null;
  });
}

// iOS detection — show manual hint
function isIOS(){
  return /iphone|ipad|ipod/i.test(navigator.userAgent) && !window.MSStream;
}
function isInStandaloneMode(){
  return window.navigator.standalone===true||window.matchMedia('(display-mode:standalone)').matches;
}

// ═══════════ INIT ═══════════
loadState();applyTheme();showScreen('screen-home');renderHome();

// Show iOS install hint if not already installed
if(isIOS()&&!isInStandaloneMode()){
  document.getElementById('btn-install-ios').style.display='flex';
}

// Register service worker
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}
</script>
